version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: hybrid-task-mongodb
    # No port mapping - MongoDB is only accessible inside Docker network
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: .
    container_name: hybrid-task-backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/hybrid-task-manager
      - PORT=5000
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongodb_data: