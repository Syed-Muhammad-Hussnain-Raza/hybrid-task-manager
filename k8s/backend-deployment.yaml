apiVersion: apps/v1
kind: Deployment
metadata:
  name: hybrid-task-backend
  labels:
    app: hybrid-task-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hybrid-task-backend
  template:
    metadata:
      labels:
        app: hybrid-task-backend
    spec:
      containers:
        - name: backend
          image: hussnainsyed/hybrid-task-manager:backend-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "5000"
            - name: MONGODB_URI
              value: mongodb://mongodb-service:27017/hybrid-task-manager
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
