apiVersion: apps/v1
kind: Deployment
metadata:
  name: hybrid-task-frontend
  labels:
    app: hybrid-task-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hybrid-task-frontend
  template:
    metadata:
      labels:
        app: hybrid-task-frontend
    spec:
      containers:
        - name: frontend
          image: hussnainsyed/hybrid-task-manager:frontend-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 15
